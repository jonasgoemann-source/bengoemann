<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday zum 16.🎉</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #ffd6e7, #d6f0ff, #fff4c2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .card {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.9);
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      max-width: 700px;
      width: 100%;
      backdrop-filter: blur(8px);
      animation: float 3s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(2.5rem, 7vw, 5rem);
      margin: 0 0 12px;
      line-height: 1.05;
    }

    .wiggle {
      display: inline-block;
      animation: wiggle 1.8s infinite;
    }

    p {
      font-size: clamp(1.1rem, 2.8vw, 1.5rem);
      color: #333;
      margin: 10px 0;
    }

    .small {
      font-size: 1rem;
      color: #666;
      margin-top: 22px;
    }

    .emoji-row {
      font-size: 2rem;
      margin-bottom: 16px;
      animation: bounce 1.6s infinite;
    }

    .button-fake {
      display: inline-block;
      margin-top: 20px;
      background: #111;
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .button-fake:hover {
      transform: scale(1.05);
    }

    .birthday-img {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 50%;
      margin: 20px auto;
      display: block;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .confetti {
      position: fixed;
      top: -12px;
      width: 12px;
      height: 18px;
      opacity: 0.9;
      animation: fall linear forwards;
      z-index: 1;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
      }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-4deg); }
      75% { transform: rotate(4deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="emoji-row">🎉🥳🎂🍻</div>

    <h1><span class="wiggle">Happy 16. Birthday Ben! 🎉</span></h1>

    <img src="beniboy.JPG" alt="Ben" class="birthday-img">

    <p>bengoemann.de ist jetzt offiziell dein digitales Eigentum.</p>
    <p>Deine eigene Mail kannst du <a href="https://webmail.strato.com/appsuite/">hier</a> öffnen: </p> 
    <p>Passwort schicke ich dir privat</p>

    <div class="button-fake">moin@bengoemann.de</div>

    <p class="small">Bitte verantwortungsvoll einsetzen. Oder halt nicht.</p>
  </div>

  <script>
    const colors = ["#ff4d6d", "#ffbe0b", "#3a86ff", "#8338ec", "#06d6a0", "#fb5607"];

    function createConfettiPiece() {
      const confetti = document.createElement("div");
      confetti.classList.add("confetti");
      document.body.appendChild(confetti);

      const size = Math.random() * 10 + 8;
      confetti.style.width = size + "px";
      confetti.style.height = size * 1.4 + "px";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
      confetti.style.animationDuration = (Math.random() * 3 + 3) + "s";

      setTimeout(() => {
        confetti.remove();
      }, 6500);
    }

    setInterval(createConfettiPiece, 120);

    for (let i = 0; i < 80; i++) {
      setTimeout(createConfettiPiece, i * 80);
    }
  </script>

</body>
</html>
