<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Ben 🎉</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: relative;
      overflow-x: hidden;
      background: linear-gradient(135deg, #f5d7e8 0%, #d9e8f6 50%, #edf3df 100%);
      padding: 24px 16px;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      position: relative;
      z-index: 2;
      width: min(100%, 760px);
      background: rgba(255, 255, 255, 0.9);
      padding: clamp(20px, 4vw, 42px);
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2.1rem, 7vw, 5.2rem);
      line-height: 0.95;
      font-weight: 800;
      word-break: break-word;
    }

    .emoji {
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 12px;
    }

    .birthday-img {
      width: clamp(140px, 28vw, 240px);
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      margin: 20px auto 26px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.18);
    }

    p {
      margin: 10px 0;
      color: #333;
      font-size: clamp(1.1rem, 2.7vw, 1.5rem);
      line-height: 1.35;
    }

    .mail-pill {
      display: inline-block;
      margin-top: 22px;
      padding: 14px 22px;
      border-radius: 999px;
      background: #111;
      color: white;
      font-weight: 700;
      font-size: clamp(1rem, 2.3vw, 1.3rem);
      word-break: break-word;
      max-width: 100%;
    }

    a {
      color: #204cff;
    }

    .small {
      margin-top: 18px;
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      color: #666;
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 12px;
      height: 18px;
      opacity: 0.9;
      animation: fall linear forwards;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 14px 10px;
      }

      .page {
        align-items: flex-start;
      }

      .card {
        margin: 10px 0 24px;
        border-radius: 22px;
      }

      h1 {
        line-height: 1;
      }

      .mail-pill {
        padding: 12px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <h1>Happy 16th<br>Birthday Ben!</h1>

      <div class="emoji">🎉</div>

      <img src="beniboy.JPG" alt="Ben" class="birthday-img">

      <p>bengoemann.de ist jetzt offiziell dein digitales Eigentum.</p>
      <p>
        Deine eigene Mail kannst du
        <a href="https://mail.google.com/" target="_blank" rel="noopener noreferrer">hier</a>
        öffnen:
      </p>
      <p>Passwort schicke ich dir privat</p>

      <div class="mail-pill">moin@bengoemann.de</div>

      <p class="small">Bitte verantwortungsvoll einsetzen. Oder halt nicht.</p>
    </div>
  </div>

  <script>
    const colors = ["#ff4d6d", "#ffbe0b", "#3a86ff", "#8338ec", "#06d6a0", "#fb5607"];

    function createConfettiPiece() {
      const confetti = document.createElement("div");
      confetti.classList.add("confetti");
      document.body.appendChild(confetti);

      const size = Math.random() * 10 + 8;
      confetti.style.width = size + "px";
      confetti.style.height = size * 1.4 + "px";
      confetti.style.left = Math.random() * 100 + "vw";
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
      confetti.style.animationDuration = (Math.random() * 3 + 3) + "s";

      setTimeout(() => {
        confetti.remove();
      }, 6500);
    }

    setInterval(createConfettiPiece, 140);

    for (let i = 0; i < 60; i++) {
      setTimeout(createConfettiPiece, i * 90);
    }
  </script>
</body>
</html>
